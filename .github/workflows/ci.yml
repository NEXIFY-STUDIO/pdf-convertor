name: CI

on:
  push:
    branches: [ main, georgeVSpdf, refactor/pdf-first-v2 ]
  pull_request:
    branches: [ main, georgeVSpdf ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & build
        run: npm run build

      - name: Run v2 module tests with coverage
        run: npm run test:v2:coverage

      - name: Run full src test suite
        run: npx vitest run src/