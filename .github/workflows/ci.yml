name: CI

on:
  push:
    branches: [main, win11version]
  pull_request:
    branches: [main, win11version]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate test fixtures
        run: node scripts/generate-test-fixtures.mjs

      - name: Typecheck & build
        run: npm run build

      - name: Run unit & integration tests (no live API)
        run: npx vitest run src/ --exclude '**/mistralClient.live.test.ts'

      - name: Run v2 module tests with coverage
        run: npm run test:v2:coverage

  production-tests:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm ci
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Generate test fixtures
        run: node scripts/generate-test-fixtures.mjs

      - name: Run production tests
        run: npm run test:production